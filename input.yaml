# ============================================================
# LLZO Pipeline Input File
# Generated by gui.py, or editable by hand.
#
# LAMMPS metal units used by this workflow:
#   distance = Angstrom, time = ps, temperature = K, energy = eV
# ============================================================

cif: "cubic-LLZO.cif"
output_dir: "./pipeline_runs"
supercell: [1, 1, 2]

# Add dopants in the GUI, or uncomment/edit the example below.
dopants: []
# Example format:
# dopants:
#   - dopant: "Nb"          # element inserted onto host sites
#     dopant_valency: 5
#     host: "Zr"            # element being replaced
#     host_valency: 4
#     count: 1              # number of host atoms to replace
#     carrier: "Li"         # mobile ion used for charge balance
#     carrier_valency: 1

distance_filters:
  dop_dop_min: null    # Angstrom
  dop_dop_max: null    # Angstrom
  dop_ion_min: null    # Angstrom
  dop_ion_max: 15      # Angstrom
  ion_ion_min: null    # Angstrom
  ion_ion_max: null    # Angstrom

max_files_per_folder: 1000
relax_model: 1

md_temperatures: [600, 800, 900, 1000, 1200]  # K
md_dump_pattern: "dump*{T}*"

run_rdf: true
rdf_temperatures: [900]  # K, must be selected from md_temperatures
rdf_pairs: "all"      # "all" or element pairs like ["Li-Li", "Li-O"]
rdf_rmax: 10.0        # Angstrom
rdf_dr: 0.05          # Angstrom

run_msd_arrhenius: true
run_elastic: true
run_trend_plots: true
conductivity_t_ref: 300  # K
msd_fit_start: 100       # ps
msd_fit_end: 200         # ps
carrier_species: null    # null = auto-detect, or "Li"/"Na"

stages:
  doping: true
  energy_comparison: true
  md: true
  post_processing: true
  rdf: true
  summary: true
